name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[langgraph]"
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Validate benchmark labels
        run: python -m agentguard validate-benchmark
      - name: Verify tests preserve tracked fixtures
        run: git diff --exit-code -- data
      - name: Verify installed dependencies
        run: python -m pip check

  real-model-e2e:
    if: ${{ vars.AGENTGUARD_RUN_REAL_MODEL_TESTS == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AGENTGUARD_REAL_MODEL_TEST: "1"
      AGENTGUARD_REAL_MODEL_CONFIG: ${{ vars.AGENTGUARD_REAL_MODEL_CONFIG }}
      AGENTGUARD_OPENAI_API_KEY: ${{ secrets.AGENTGUARD_OPENAI_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with real-model dependencies
        run: python -m pip install -e ".[langgraph,openai]"
      - name: Run real model E2E test
        run: python -m unittest discover -s tests/non_blackbox/provider -t . -p "test_real_model_e2e_*.py"

  real-model-security:
    if: ${{ vars.AGENTGUARD_RUN_REAL_MODEL_SECURITY_TESTS == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AGENTGUARD_REAL_MODEL_SECURITY_TEST: "1"
      AGENTGUARD_REAL_MODEL_CONFIG: ${{ vars.AGENTGUARD_REAL_MODEL_CONFIG }}
      AGENTGUARD_REAL_MODEL_OUTPUT_ROOT: runs/ci-real-model
      AGENTGUARD_OPENAI_API_KEY: ${{ secrets.AGENTGUARD_OPENAI_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with real-model dependencies
        run: python -m pip install -e ".[langgraph,openai]"
      - name: Run provider-backed security tests
        run: python -m unittest discover -s tests/non_blackbox/provider -t . -p "test_real_model_security_provider_smoke_*.py"
      - name: Upload smoke metrics and audit evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-model-smoke-${{ github.run_id }}
          path: |
            runs/ci-real-model/smoke/metrics.json
            runs/ci-real-model/smoke/report.md
            runs/ci-real-model/smoke/manifest.json
            runs/ci-real-model/smoke/audit
          if-no-files-found: warn
          retention-days: 14

  real-model-frontier:
    if: ${{ vars.AGENTGUARD_RUN_REAL_MODEL_FRONTIER_TESTS == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AGENTGUARD_REAL_MODEL_FRONTIER_TEST: "1"
      AGENTGUARD_REAL_MODEL_CONFIG: ${{ vars.AGENTGUARD_REAL_MODEL_CONFIG }}
      AGENTGUARD_REAL_MODEL_OUTPUT_ROOT: runs/ci-real-model
      AGENTGUARD_OPENAI_API_KEY: ${{ secrets.AGENTGUARD_OPENAI_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with real-model dependencies
        run: python -m pip install -e ".[langgraph,openai]"
      - name: Run provider-backed frontier tests
        run: python -m unittest discover -s tests/non_blackbox/provider -t . -p "test_real_model_security_provider_frontier_*.py"
      - name: Upload frontier metrics and audit evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-model-frontier-${{ github.run_id }}
          path: |
            runs/ci-real-model/frontier/metrics.json
            runs/ci-real-model/frontier/report.md
            runs/ci-real-model/frontier/manifest.json
            runs/ci-real-model/frontier/audit
          if-no-files-found: warn
          retention-days: 14
