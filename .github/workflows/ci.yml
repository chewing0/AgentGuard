name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[langgraph]"
      - name: Run unit tests
        run: python -m unittest discover -s tests

  real-model-e2e:
    if: ${{ vars.AGENTGUARD_RUN_REAL_MODEL_TESTS == '1' }}
    runs-on: ubuntu-latest
    env:
      AGENTGUARD_REAL_MODEL_TEST: "1"
      AGENTGUARD_OPENAI_API_KEY: ${{ secrets.AGENTGUARD_OPENAI_API_KEY }}
      AGENTGUARD_OPENAI_BASE_URL: ${{ vars.AGENTGUARD_OPENAI_BASE_URL || 'https://api.siliconflow.cn/v1' }}
      AGENTGUARD_OPENAI_MODEL: ${{ vars.AGENTGUARD_OPENAI_MODEL || 'Pro/zai-org/GLM-5.1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with real-model dependencies
        run: python -m pip install -e ".[langgraph,openai]"
      - name: Run real model E2E test
        run: python -m unittest tests.test_real_model_e2e
