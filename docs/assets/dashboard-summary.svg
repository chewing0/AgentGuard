<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">AgentGuard static dashboard summary graphic</title>
  <desc id="desc">Illustrative, manually authored dashboard-style summary graphic; it is not a live product screenshot and its controls are visual only.</desc>
  <rect width="1100" height="640" fill="#ffffff"/>
  <rect x="26" y="22" width="1048" height="596" rx="8" fill="#f7f9fb" stroke="#d7dde5"/>
