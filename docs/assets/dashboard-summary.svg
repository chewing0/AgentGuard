    <text x="670" y="298" fill="#5d6978" font-size="12" font-weight="700">High Risk</text>
    <text x="820" y="298" fill="#5d6978" font-size="12" font-weight="700">Parameter</text>

    <text x="76" y="331" fill="#17202a" font-size="13">none</text>
    <text x="220" y="331" fill="#17202a" font-size="13">1.0</text>
    <text x="370" y="331" fill="#b42318" font-size="13" font-weight="700">1.0</text>
    <text x="520" y="331" fill="#b42318" font-size="13" font-weight="700">1.0</text>
    <text x="670" y="331" fill="#b42318" font-size="13" font-weight="700">1.0</text>
    <text x="820" y="331" fill="#b42318" font-size="13" font-weight="700">1.0</text>

