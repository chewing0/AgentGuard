    <rect x="76" y="556" width="88" height="26" rx="13" fill="#a15c07"/>
    <text x="86" y="574" fill="#ffffff" font-size="12" font-weight="700">review</text>
    <text x="190" y="574" fill="#17202a" font-size="13">code.python</text>
