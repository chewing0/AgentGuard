    <text x="326" y="191" fill="#5d6978" font-size="13">Unsafe Execution Prevented</text>
    <text x="326" y="226" fill="#147a53" font-size="30" font-weight="700">26/26</text>

    <rect x="556" y="162" width="230" height="86" rx="8" fill="#ffffff" stroke="#d7dde5"/>
    <text x="576" y="191" fill="#5d6978" font-size="13">Unsafe Calls Blocked</text>
    <text x="576" y="226" fill="#147a53" font-size="30" font-weight="700">25</text>

    <rect x="806" y="162" width="230" height="86" rx="8" fill="#ffffff" stroke="#d7dde5"/>
    <text x="826" y="191" fill="#5d6978" font-size="13">Confirmation Required</text>
    <text x="826" y="226" fill="#a15c07" font-size="30" font-weight="700">1</text>

    <rect x="56" y="274" width="980" height="116" rx="8" fill="#ffffff" stroke="#d7dde5"/>
