    <rect x="76" y="476" width="88" height="26" rx="13" fill="#147a53"/>
    <text x="97" y="494" fill="#ffffff" font-size="12" font-weight="700">allow</text>
    <text x="190" y="494" fill="#17202a" font-size="13">kb.search</text>
    <text x="326" y="494" fill="#5d6978" font-size="13">Policy checks passed</text>

    <rect x="76" y="518" width="88" height="26" rx="13" fill="#b42318"/>
    <text x="97" y="536" fill="#ffffff" font-size="12" font-weight="700">block</text>
    <text x="190" y="536" fill="#17202a" font-size="13">file.read</text>
