    <text x="370" y="361" fill="#147a53" font-size="13" font-weight="700">0.0</text>
    <text x="520" y="361" fill="#147a53" font-size="13" font-weight="700">0.0</text>
    <text x="670" y="361" fill="#147a53" font-size="13" font-weight="700">0.0</text>
    <text x="820" y="361" fill="#147a53" font-size="13" font-weight="700">0.0</text>

